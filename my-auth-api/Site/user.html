<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuscleLab - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="estilo/user.css">
</head>
<body>
    
    <header id="cabecalho-principal">
        <div class="info-usuario">
            <img src="./imagem/default-avatar.png" alt="Foto do Usuário" id="foto-usuario" class="foto-usuario">
            <h1 id="exibir-nome-usuario">Olá, Usuário MuscleLab!</h1>
        </div>
        <button id="btn-sair" class="btn-sair">Sair <i class="fas fa-sign-out-alt"></i></button>
    </header>

    <main class="conteudo-painel">

        <div class="cartao-recurso" data-recurso="quiz">
            <i class="fas fa-question-circle icone-cartao"></i>
            <h2 class="titulo-cartao">Montar Meu Treino</h2>
            <p>Responda a um quiz rápido e personalize seu plano de exercícios.</p>
            <button class="btn-principal" onclick="iniciarQuiz()">INICIAR QUIZ</button>
        </div>

        <div class="cartao-recurso" data-recurso="imc">
            <i class="fas fa-calculator icone-cartao"></i>
            <h2 class="titulo-cartao">Calcular Meu IMC</h2>
            <p>Monitore seu Índice de Massa Corporal e acompanhe sua evolução.</p>
            <button class="btn-principal" onclick="abrirIMC()">CALCULAR IMC</button>
        </div>

        <div class="cartao-recurso" data-recurso="treino">
            <i class="fas fa-dumbbell icone-cartao"></i>
            <h2 class="titulo-cartao">Ver Meu Treino</h2>
            <p>Acesse seu plano de treino semanal montado e faça o check-in dos exercícios.</p>
            <button class="btn-principal" onclick="verTreino()">VER DETALHES</button>
        </div>
        
    </main>

    <script src="js/user.js"></script>
</body>
</html>
