<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuscleLab - Quiz do Treino</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="estilo/quiz.css">
</head>
<body>

    <!-- Botão voltar -->
    <a href="user.html" class="botao-voltar" title="Voltar para o Painel">
        <i class="fas fa-arrow-left"></i>
        Voltar
    </a>

    <div class="container-quiz">

        <!-- Cabeçalho -->
        <div class="cabecalho-quiz">
            <h1 class="titulo-principal">
                MONTE SEU <span class="highlight">TREINO</span> IDEAL
            </h1>
            <p class="subtitulo-quiz">Responda às perguntas abaixo e receba um plano personalizado para a sua jornada MuscleLab.</p>
        </div>

        <!-- Card do quiz -->
        <div class="cartao-quiz">

            <!-- Barra de progresso no topo -->
            <div class="progresso-track">
                <div class="progresso-track-fill" id="barra-progresso-fill"></div>
            </div>

            <div class="quiz-inner">

                <!-- Linha de progresso textual -->
                <div class="progresso-quiz">
                    <span class="progresso-step-tag">
                        <i class="fas fa-bolt"></i>
                        Pergunta <span id="pergunta-atual">1</span>
                    </span>
                    <span class="progresso-frac" id="frac-total">de 10</span>
                </div>

                <!-- Texto da pergunta -->
                <h2 id="texto-pergunta" class="texto-pergunta">Carregando pergunta...</h2>

                <!-- Opções -->
                <div id="container-opcoes" class="container-opcoes"></div>

                <!-- Navegação -->
                <div class="navegacao-quiz">
                    <button id="btn-anterior" class="btn-geral btn-anterior" disabled>
                        <i class="fas fa-arrow-left" style="margin-right:6px;font-size:0.85em"></i>Anterior
                    </button>
                    <button id="btn-proximo" class="btn-geral btn-proximo" disabled>
                        Próxima <i class="fas fa-arrow-right" style="margin-left:6px;font-size:0.85em"></i>
                    </button>
                    <button id="btn-finalizar" class="btn-geral btn-finalizar" style="display:none;">
                        <i class="fas fa-flag-checkered" style="margin-right:8px"></i>Finalizar Quiz
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="js/quiz.js"></script>
</body>
</html>
