<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuscleLab - Meu Treino</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="estilo/treino.css">
</head>
<body>
    <div class="fundo-treino">
        
        <a href="user.html" class="botao-voltar" title="Voltar para o Painel">
            <i class="fas fa-arrow-left"></i>
        </a>

        <div class="container-treino">
            <div class="cabecalho-treino">
                <h1 class="titulo-principal">TREINO DO DIA</h1>
                <p class="subtitulo-treino">Plano Atual: <span id="nome-plano">Rotina de Força Total</span></p>
                <div class="status-dia">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="data-hoje">Carregando data...</span>
                </div>
            </div>

            <div class="conteudo-treino">
                
                <ul id="lista-exercicios" class="lista-exercicios">
                    <li class="cabecalho-tabela">
                        <div>EXERCÍCIO</div>
                        <div>SÉRIES/REPS</div>
                        <div style="text-align: center;"><i class="fas fa-check"></i></div>
                    </li>
                </ul>

                <div class="checkin-final">
                    <select id="status-treino" class="seletor-status">
                        <option value="">-- Avalie a Intensidade --</option>
                        <option value="Intenso">Intenso</option>
                        <option value="Mediano">Mediano</option>
                        <option value="Leve">Leve</option>
                    </select>
                    
                    <button id="btn-finalizar-treino" class="btn-principal">
                        FINALIZAR TREINO E ENVIAR
                    </button>
                    
                    <p id="mensagem-feedback" class="mensagem-feedback"></p>
                </div>

            </div>
        </div>
    </div>
    
    <script src="js/treino.js"></script> 
</body>
</html>
